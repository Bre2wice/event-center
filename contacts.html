    <meta charset="UTF-8">

    <link rel="stylesheet" href="styles.css">
</head>

<body>
    
    <header class="site-header">
       <a href="index.html" class="site-logo"> Jammin' Nights Music Festival Center </a>
       <nav class="navbar">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="events.html">Events</a></li>
            <li><a href="menu.html">Menu</a></li>
            <li><a href="location.html">Location</a></li>
            <li><a href="contacts.html">Contacts</a></li>
        </ul>
       </nav>
    </header>

    <main class="site-main cantact-page">
        <section class="contact-form-container">
            <h1>Contact Us</h1>
            <form action="#" method="post" class="contact-form">
              <label for="name">Name <span>*</span></label>
              <input type="text" id="name" name="name" placeholder="John Doe" required>
      
              <label for="email">Email <span>*</span></label>
              <input type="email" id="email" name="email" placeholder="john@example.com" required>
      
              <label for="message">Message / Inquiry <span>*</span></label>
              <textarea id="message" name="message" rows="5" placeholder="Your message here..." required></textarea>
      
              <button type="submit">Send Message</button>
            </form>
          </section>
    </main>

    <Footer class="site-footer">
        <p>&copy; 2025 Summer Nights Music Festival Website. All rights reserved.</p>
    </Footer>
</body>

</html>
